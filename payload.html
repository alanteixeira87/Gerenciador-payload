<main class="flex-1 overflow-y-auto p-4 md:p-10">
    <div class="space-y-8 max-w-7xl mx-auto">
        <div class="flex items-center gap-4 mb-6">
            <div class="p-3 bg-slate-800 rounded-xl shadow-lg text-white"><i data-lucide="braces" size="24"></i></div>
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">Gerador de Payload API</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Geração de massa de dados estruturada para testes automatizados.</p>
            </div>
        </div>
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-5 space-y-6">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 p-6">
                    <h4 class="text-sm font-bold text-primary-600 dark:text-primary-400 uppercase tracking-wider border-b border-gray-200 dark:border-slate-700 pb-2 mb-4">Dados do Usuário</h4>
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 block mb-1">Nome Completo</label><input type="text" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-600 rounded-lg text-sm dark:text-white"></div>
                        <div><label class="text-xs font-bold text-gray-500 dark:text-gray-400 block mb-1">ID / Referência Única</label><input type="text" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-600 rounded-lg text-sm dark:text-white font-mono"></div>
                    </div>
                </div>
            </div>
            <div class="xl:col-span-7 flex flex-col space-y-6">
                <div class="bg-slate-950 rounded-2xl shadow-xl flex-1 flex flex-col overflow-hidden relative border border-slate-800 min-h-[400px]">
                    <div class="px-5 py-3 bg-slate-900 flex justify-between items-center border-b border-black">
                        <span class="text-xs font-mono text-gray-400 flex items-center gap-2"><i data-lucide="terminal" size="14"></i> payload_request.json</span>
                    </div>
                    <textarea readonly class="flex-1 w-full bg-transparent text-green-400 font-mono text-sm p-6 resize-none outline-none">{ "status": "aguardando geração" }</textarea>
                </div>
            </div>
        </div>
    </div>
</main>
