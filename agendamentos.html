<main class="flex-1 overflow-y-auto p-4 md:p-10">
    <div class="space-y-8 max-w-6xl mx-auto">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden ring-1 ring-black/5">
            <div class="px-8 py-5 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50/50 dark:bg-slate-800">
                <div><h2 class="text-lg font-bold text-gray-900 dark:text-white">Novo Agendamento</h2><p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Planejamento de testes de longa duração.</p></div>
                <button class="px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-lg shadow-sm"><i data-lucide="save" size="18" class="inline"></i> Salvar</button>
            </div>
            <div class="p-8 grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-6 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Projeto / Cliente</label><input type="text" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm dark:text-white"></div>
                <div class="md:col-span-3 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Ambiente</label><select class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm dark:text-white"><option>Staging</option></select></div>
                <div class="md:col-span-3 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Teste</label><select class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm dark:text-white"><option>E2E Checkout</option></select></div>
                <div class="md:col-span-12 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Cronograma Detalhado</label><textarea class="w-full px-4 py-3 bg-gray-100 dark:bg-slate-950 border border-gray-200 dark:border-slate-700 rounded-xl text-sm font-mono h-32 resize-none dark:text-gray-300"></textarea></div>
            </div>
        </div>
    </div>
</main>
