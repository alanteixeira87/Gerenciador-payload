<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Nomenclatura | Gestor de Serviços QA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                        slate: { 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        .dark .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 h-screen flex overflow-hidden transition-colors duration-300 selection:bg-primary-500 selection:text-white">

    <aside class="w-72 bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 flex flex-col z-20 hidden md:flex transition-colors duration-300 h-full">
        <div class="p-8 shrink-0">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white flex items-center gap-3">
                <div class="p-2 bg-primary-100 dark:bg-primary-500/10 rounded-lg">
                    <i data-lucide="layers" class="text-primary-600 dark:text-primary-400"></i>
                </div>
                <div>Gestor<span class="text-primary-600 dark:text-primary-400">Serviços</span></div>
            </h1>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 font-medium">QA Automation Suite v5.1</p>
        </div>

        <nav class="flex-1 px-6 space-y-2 overflow-y-auto custom-scrollbar">
            <div class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3 mt-4 px-4">Testes UI</div>
            
            <a href="nomenclatura.html" class="group w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl bg-primary-600 text-white shadow-lg shadow-primary-500/20 transition-all duration-200">
                <i data-lucide="file-signature" size="20"></i> Nomenclatura
            </a>
            
            <a href="agendamentos.html" class="group w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700/50 transition-all duration-200">
                <i data-lucide="calendar-clock" size="20"></i> Agendamentos
            </a>
            
            <a href="relatorios.html" class="group w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700/50 transition-all duration-200">
                <i data-lucide="clipboard-list" size="20"></i> Relatórios
            </a>

            <div class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3 mt-8 px-4">Testes API</div>
            
            <a href="payload.html" class="group w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700/50 transition-all duration-200">
                <i data-lucide="braces" size="20"></i> Gerador de Payload
            </a>
        </nav>

        <div class="p-6 border-t border-gray-200 dark:border-slate-700 shrink-0">
            <button onclick="app.toggleTheme()" class="flex items-center justify-between w-full px-4 py-3 text-sm font-medium text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-slate-700/50 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition-all">
                <span class="flex items-center gap-2"><i data-lucide="moon" size="18"></i> Aparência</span>
                <div class="w-10 h-5 bg-gray-300 dark:bg-primary-600 rounded-full relative transition-colors">
                    <div class="absolute top-1 left-1 bg-white w-3 h-3 rounded-full transition-transform dark:translate-x-5"></div>
                </div>
            </button>
        </div>
    </aside>

    <div class="md:hidden fixed top-0 w-full bg-white dark:bg-slate-800 z-50 px-6 py-4 flex justify-between items-center border-b border-gray-200 dark:border-slate-700 shadow-sm">
        <span class="font-bold text-lg text-gray-900 dark:text-white flex items-center gap-2">
            <i data-lucide="layers" class="text-primary-500" size="20"></i> GestorServiços
        </span>
        <button onclick="document.querySelector('aside').classList.toggle('hidden'); document.querySelector('aside').classList.toggle('absolute'); document.querySelector('aside').classList.toggle('h-full'); document.querySelector('aside').classList.toggle('w-full');" class="text-gray-600 dark:text-gray-300 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700">
            <i data-lucide="menu"></i>
        </button>
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-10 relative mt-16 md:mt-0 scroll-smooth custom-scrollbar">
        
        <div id="toast" class="fixed top-6 right-6 z-50 translate-x-[120%] opacity-0 transition-all duration-500 ease-out flex items-center w-full max-w-sm p-4 text-gray-600 bg-white rounded-xl shadow-2xl dark:text-gray-300 dark:bg-slate-800 border-l-4 border-green-500 backdrop-blur-sm" role="alert">
            <div id="toast-icon-bg" class="inline-flex items-center justify-center flex-shrink-0 w-9 h-9 text-green-500 bg-green-100 rounded-lg dark:bg-green-500/20 dark:text-green-400">
                <i id="toast-icon" data-lucide="check-circle-2" size="20"></i>
            </div>
            <div class="ml-4">
                <h4 id="toast-title" class="text-sm font-semibold text-gray-900 dark:text-white">Sucesso!</h4>
                <div class="text-xs font-medium mt-0.5" id="toast-msg">Operação realizada.</div>
            </div>
        </div>

        <div class="fade-in space-y-8 max-w-6xl mx-auto">
            
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden ring-1 ring-black/5">
                <div class="px-8 py-5 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50/50 dark:bg-slate-800">
                    <div><h2 class="text-lg font-bold text-gray-900 dark:text-white">Gerador de Nomenclatura</h2><p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Padronização de logs de execução.</p></div>
                    <button onclick="app.generateLog()" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-lg shadow-lg shadow-primary-500/20 transition-all active:scale-95 flex items-center gap-2"><i data-lucide="wand-2" size="18"></i> Gerar Log</button>
                </div>
                <div class="p-8 grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-6 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Código/Nome do Teste</label><input list="listTestes" id="logTeste" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500/50 outline-none dark:text-white"><datalist id="listTestes"></datalist></div>
                    <div class="md:col-span-3 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Dispositivo</label><select id="logSO" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500/50 outline-none dark:text-white"><option>Android</option><option>iOS</option><option>Web Desktop</option></select></div>
                    <div class="md:col-span-3 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Data</label><input type="date" id="logData" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500/50 outline-none dark:text-white dark:[color-scheme:dark]"></div>
                    <div class="md:col-span-6 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Projeto / Cliente</label><input list="listMarcas" id="logMarca" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500/50 outline-none dark:text-white" oninput="app.syncEvidences()"><datalist id="listMarcas"></datalist></div>
                    <div class="md:col-span-3 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Ambiente</label><select id="logSegmento" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500/50 outline-none dark:text-white" onchange="app.syncEvidences()"><option>Staging</option><option>Produção</option></select></div>
                    <div class="md:col-span-3 space-y-2"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</label><select id="logStatus" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-sm font-bold dark:text-white"><option class="text-green-500">PASS</option><option class="text-red-500">FAIL</option><option class="text-yellow-500">BLOCKED</option></select></div>
                </div>
                <div id="logGroup" class="hidden border-t border-gray-200 dark:border-slate-700 bg-gray-50/80 dark:bg-slate-900/30 p-6">
                    <div class="flex shadow-sm">
                        <div id="logResult" class="relative flex-grow flex items-center px-4 py-3.5 text-sm font-mono text-primary-600 dark:text-primary-400 bg-white dark:bg-slate-950 border border-gray-200 dark:border-slate-700 rounded-l-xl border-r-0 truncate select-all">...</div>
                        <button onclick="app.copyText('logResult')" class="inline-flex items-center gap-2 rounded-r-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-6 text-sm font-semibold text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-700 transition-all border-l"><i data-lucide="copy" size="16"></i> Copiar</button>
                    </div>
                </div>
            </div>
            
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden ring-1 ring-black/5">
                <div class="px-8 py-5 border-b border-gray-200 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-800"><h2 class="text-lg font-bold text-gray-900 dark:text-white">Nomenclatura de Evidência</h2></div>
                <div class="p-8 space-y-5">
                    <div class="group"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 block">Cenário Principal</label><div class="flex shadow-sm hover:shadow-md cursor-pointer" onclick="app.copyText('evResult1')"><div id="evResult1" class="flex-grow px-4 py-3 text-sm font-mono text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-l-xl border-r-0 truncate flex items-center">Aguardando...</div><button class="rounded-r-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-5 text-gray-400 group-hover:text-primary-500 transition-colors border-l"><i data-lucide="copy" size="18"></i></button></div></div>
                    <div class="group"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 block">Versão Build</label><div class="flex shadow-sm hover:shadow-md cursor-pointer" onclick="app.copyText('evResult2')"><div id="evResult2" class="flex-grow px-4 py-3 text-sm font-mono text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-l-xl border-r-0 truncate flex items-center">Aguardando...</div><button class="rounded-r-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-5 text-gray-400 group-hover:text-primary-500 transition-colors border-l"><i data-lucide="copy" size="18"></i></button></div></div>
                    <div class="group"><label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 block">Log de Erro</label><div class="flex shadow-sm hover:shadow-md cursor-pointer" onclick="app.copyText('evResult3')"><div id="evResult3" class="flex-grow px-4 py-3 text-sm font-mono text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-l-xl border-r-0 truncate flex items-center">Aguardando...</div><button class="rounded-r-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-5 text-gray-400 group-hover:text-primary-500 transition-colors border-l"><i data-lucide="copy" size="18"></i></button></div></div>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        const DB = {
            marcas: ["App E-commerce Alpha", "Plataforma SaaS Beta", "ERP Global System", "Logistics Delivery Hub", "HealthTech Portal", "Sistema de Gestão RH", "Gateway de Pagamentos X", "App Mobile Cliente Final", "Dashboard Analítico"],
            testes: ["E2E Checkout Workflow", "Carga de Dados - Stress Test", "Batch Processing Retry", "Smoke Test - Login", "CRUD - Criação de Usuário", "Fluxo de Aprovação de Compra", "Recuperação de Senha Segura", "Validação de Token JWT", "Sincronização Offline", "Geração de Relatório Export"]
        };

        const app = {
            init: function() {
                this.populateLists();
                if(document.getElementById('logData')) document.getElementById('logData').valueAsDate = new Date();
                lucide.createIcons();
                this.syncEvidences();

                if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            },

            populateLists: function() {
                const createOptions = (arr, elId) => {
                    const el = document.getElementById(elId);
                    if(!el) return;
                    arr.forEach(i => { const opt = document.createElement('option'); opt.value = i; el.appendChild(opt); });
                };
                createOptions(DB.marcas, 'listMarcas');
                createOptions(DB.testes, 'listTestes');
            },

            toggleTheme: function() {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            },

            showToast: function(msg, type = 'success') {
                const t = document.getElementById('toast');
                const m = document.getElementById('toast-msg');
                const title = document.getElementById('toast-title');
                const iconBg = document.getElementById('toast-icon-bg');
                m.textContent = msg;
                if (type === 'error') {
                    t.classList.remove('border-green-500'); t.classList.add('border-red-500');
                    iconBg.className = 'inline-flex items-center justify-center flex-shrink-0 w-9 h-9 text-red-500 bg-red-100 rounded-lg dark:bg-red-500/20 dark:text-red-400';
                    title.textContent = 'Atenção';
                    document.getElementById('toast-icon').setAttribute('data-lucide', 'alert-circle');
                } else {
                    t.classList.remove('border-red-500'); t.classList.add('border-green-500');
                    iconBg.className = 'inline-flex items-center justify-center flex-shrink-0 w-9 h-9 text-green-500 bg-green-100 rounded-lg dark:bg-green-500/20 dark:text-green-400';
                    title.textContent = 'Sucesso!';
                    document.getElementById('toast-icon').setAttribute('data-lucide', 'check-circle-2');
                }
                lucide.createIcons();
                t.classList.remove('translate-x-[120%]', 'opacity-0');
                setTimeout(() => t.classList.add('translate-x-[120%]', 'opacity-0'), 3500);
            },

            generateLog: function() {
                const f = { teste: document.getElementById('logTeste').value, so: document.getElementById('logSO').value, marca: document.getElementById('logMarca').value, seg: document.getElementById('logSegmento').value, status: document.getElementById('logStatus').value, data: document.getElementById('logData').value };
                if(!f.teste || !f.marca) { this.showToast("Preencha Projeto e Teste!", "error"); return; }
                const str = `${f.status} - ${f.marca} - ${f.seg} - ${f.teste} - ${f.data.split('-').reverse().join('-')} - ${f.so}`;
                document.getElementById('logResult').textContent = str;
                document.getElementById('logGroup').classList.remove('hidden');
                this.copyText('logResult');
            },

            syncEvidences: function() { 
                const marca = document.getElementById('logMarca').value || "...";
                const seg = document.getElementById('logSegmento').value;
                document.getElementById('evResult1').textContent = `Evidencia - ${marca} - ${seg} - Fluxo_OK`;
                document.getElementById('evResult2').textContent = `Evidencia - ${marca} - ${seg} - Versão_Build`;
                document.getElementById('evResult3').textContent = `Evidencia - ${marca} - ${seg} - Log_de_Erro`;
            },

            copyText: function(id) {
                const el = document.getElementById(id);
                const txt = el.value !== undefined ? el.value : el.textContent;
                navigator.clipboard.writeText(txt).then(() => this.showToast('Copiado para a área de transferência!'));
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
